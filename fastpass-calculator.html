<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastPass Calculator — TradingBossBot</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d0d0f;
    color: #e8e6e1;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 640px; margin: 0 auto; }

  .badge {
    display: inline-block;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    color: #7c71e8;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    margin-bottom: 12px;
  }

  h1 { font-size: 24px; font-weight: 600; color: #f0ede8; margin-bottom: 6px; }
  .sub { font-size: 13px; color: #6b6860; margin-bottom: 2rem; }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #4a4844;
    margin-bottom: 10px;
  }

  .firm-tabs { display: flex; gap: 8px; margin-bottom: 1rem; }

  .firm-tab {
    flex: 1;
    padding: 10px;
    background: #131316;
    border: 1px solid #1e1e24;
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    color: #6b6860;
    transition: all .15s;
  }

  .firm-tab:hover { border-color: #2e2e3a; color: #a8a5a0; }
  .firm-tab.active { border-color: #5b52d0; background: #13121f; color: #a09aee; }

  .size-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 1.75rem;
    min-height: 60px;
    align-items: start;
  }

  .size-btn {
    background: #131316;
    border: 1px solid #1e1e24;
    border-radius: 8px;
    padding: 12px 8px;
    cursor: pointer;
    text-align: center;
    transition: all .15s;
  }

  .size-btn:hover { border-color: #2e2e3a; }
  .size-btn.active { border-color: #5b52d0; background: #13121f; }

  .size-name { font-size: 15px; font-weight: 700; color: #e0ddd8; }
  .size-detail { font-size: 11px; color: #4a4844; margin-top: 3px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.75rem; }

  .form-group label {
    display: block;
    font-size: 11px;
    color: #5a5854;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: .05em;
    font-weight: 600;
  }

  .form-group input {
    width: 100%;
    background: #131316;
    border: 1px solid #1e1e24;
    border-radius: 6px;
    padding: 9px 11px;
    font-size: 15px;
    font-weight: 500;
    color: #e8e6e1;
    outline: none;
    transition: border-color .15s;
  }

  .form-group input:focus { border-color: #5b52d0; }

  .divider { border: none; border-top: 1px solid #1a1a1e; margin: 1.5rem 0; }

  .results-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1.25rem; }

  .metric { background: #131316; border: 1px solid #1e1e24; border-radius: 8px; padding: 14px; }
  .metric-label { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #4a4844; margin-bottom: 6px; }
  .metric-value { font-size: 26px; font-weight: 600; color: #f0ede8; line-height: 1; }
  .metric-unit  { font-size: 11px; color: #4a4844; margin-top: 4px; }

  .banner { border-radius: 8px; padding: 13px 16px; margin-bottom: 1.25rem; border: 1px solid; }
  .banner.ok   { background: #0d1f12; border-color: #1a3d22; color: #4caf6f; }
  .banner.warn { background: #1f1a0d; border-color: #3d3022; color: #d4963a; }
  .banner.fail { background: #1f0d0d; border-color: #3d1a1a; color: #d44a4a; }
  .banner-title { font-size: 14px; font-weight: 600; }
  .banner-sub   { font-size: 12px; margin-top: 4px; opacity: .8; }

  .trade-box { background: #131316; border: 1px solid #1e1e24; border-radius: 8px; padding: 14px; margin-bottom: 1rem; }

  .trade-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid #1a1a1e;
    font-size: 13px;
  }

  .trade-row:last-child { border-bottom: none; }
  .trade-row span:first-child { color: #5a5854; }
  .trade-row span:last-child  { font-weight: 600; color: #e8e6e1; }
  .trade-row.total span:last-child { color: #4caf6f; font-size: 15px; }

  .note { font-size: 11px; color: #3a3834; line-height: 1.7; }

  .footer {
    margin-top: 2.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid #1a1a1e;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-brand { font-size: 12px; font-weight: 600; color: #3a3834; letter-spacing: .05em; text-transform: uppercase; }
  .footer-link  { font-size: 12px; color: #5b52d0; text-decoration: none; }
  .footer-link:hover { color: #7c71e8; }

  @media (max-width: 480px) {
    .form-grid  { grid-template-columns: 1fr; }
    .size-grid  { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="container">

  <div class="badge">FastPass strategy</div>
  <h1>Prop Firm Pass Calculator</h1>
  <p class="sub">NQ futures &middot; $5.00 per tick &middot; one trade to pass or fail</p>

  <p class="section-label">Select firm</p>
  <div class="firm-tabs">
    <button class="firm-tab active" data-firm="apex">Apex</button>
    <button class="firm-tab" data-firm="lucid">Lucid</button>
    <button class="firm-tab" data-firm="custom">Custom</button>
  </div>

  <p class="section-label">Account size</p>
  <div class="size-grid" id="size-grid"></div>

  <p class="section-label">Parameters</p>
  <div class="form-grid">
    <div class="form-group">
      <label>Profit target ($)</label>
      <input type="number" id="target" value="1500" min="100" step="100">
    </div>
    <div class="form-group">
      <label>Days to pass</label>
      <input type="number" id="days" value="1" min="1" max="10">
    </div>
    <div class="form-group">
      <label>Max contracts (NQ mini)</label>
      <input type="number" id="contracts" value="4" min="1" max="20">
    </div>
    <div class="form-group">
      <label>Commission / contract ($)</label>
      <input type="number" id="commission" value="4.50" min="0" step="0.5">
    </div>
  </div>

  <hr class="divider">
  <div id="results"></div>

  <div class="footer">
    <span class="footer-brand">TradingBossBot</span>
    <a href="https://tradingbossbot.com" class="footer-link" target="_blank">tradingbossbot.com</a>
  </div>

</div>
<script>
const NQ_TICK = 5.00;

const firms = {
  apex: [
    { size:'25K',  target:1500, contracts:4,  days:1 },
    { size:'50K',  target:3000, contracts:6,  days:1 },
    { size:'100K', target:6000, contracts:8,  days:1 },
    { size:'150K', target:9000, contracts:12, days:1 },
  ],
  lucid: [
    { size:'25K',  target:1250, contracts:2,  days:1 },
    { size:'50K',  target:3000, contracts:4,  days:1 },
    { size:'100K', target:6000, contracts:6,  days:1 },
    { size:'150K', target:9000, contracts:10, days:1 },
  ],
  custom: null
};

function renderSizeButtons(firm) {
  const grid = document.getElementById('size-grid');
  if (!firms[firm]) {
    grid.innerHTML = '<p style="font-size:13px;color:#5a5854;grid-column:1/-1;padding:4px 0;">Set parameters manually below.</p>';
    return;
  }
  grid.innerHTML = firms[firm].map((a, i) => `
    <button class="size-btn${i===0?' active':''}" data-target="${a.target}" data-contracts="${a.contracts}" data-days="${a.days}">
      <div class="size-name">${a.size}</div>
      <div class="size-detail">${a.contracts} mini</div>
    </button>
  `).join('');

  grid.querySelectorAll('.size-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      grid.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('target').value    = btn.dataset.target;
      document.getElementById('contracts').value = btn.dataset.contracts;
      document.getElementById('days').value      = btn.dataset.days;
      calc();
    });
  });

  const first = firms[firm][0];
  document.getElementById('target').value    = first.target;
  document.getElementById('contracts').value = first.contracts;
  document.getElementById('days').value      = first.days;
  calc();
}

function calc() {
  const target      = parseFloat(document.getElementById('target').value)    || 1500;
  const days        = parseInt(document.getElementById('days').value)         || 1;
  const contracts   = parseInt(document.getElementById('contracts').value)    || 4;
  const commPerCont = parseFloat(document.getElementById('commission').value) || 4.50;

  const dailyTarget  = target / days;
  const commPerTrade = commPerCont * contracts;
  const grossNeeded  = dailyTarget + commPerTrade;
  const grossPerTick = contracts * NQ_TICK;
  const ticksNeeded  = Math.ceil(grossNeeded / grossPerTick);
  const actualNet    = (ticksNeeded * grossPerTick) - commPerTrade;
  const totalProfit  = actualNet * days;
  const pointsNeeded = (ticksNeeded * 0.25).toFixed(2);

  let cls, title, sub;
  if (ticksNeeded <= 120) {
    cls   = 'ok';
    title = ticksNeeded <= 50 ? 'Quick pass — very achievable' : 'Standard FastPass setup';
    sub   = `${ticksNeeded} ticks (${pointsNeeded} pts) &mdash; $${Math.round(grossPerTick).toLocaleString()} gross per tick move`;
  } else if (ticksNeeded <= 200) {
    cls   = 'warn';
    title = 'Riskier setup — requires more than 30 points';
    sub   = `${ticksNeeded} ticks (${pointsNeeded} pts) &mdash; consider more contracts or splitting into more days`;
  } else {
    cls   = 'fail';
    title = 'Not practical in one trade — add contracts or days';
    sub   = `${ticksNeeded} ticks is too many for a single entry`;
  }

  document.getElementById('results').innerHTML = `
    <div class="banner ${cls}">
      <div class="banner-title">${title}</div>
      <div class="banner-sub">${sub}</div>
    </div>
    <div class="results-grid">
      <div class="metric">
        <div class="metric-label">Daily target</div>
        <div class="metric-value">$${Math.round(dailyTarget).toLocaleString()}</div>
        <div class="metric-unit">net profit / day</div>
      </div>
      <div class="metric">
        <div class="metric-label">Ticks needed</div>
        <div class="metric-value">${ticksNeeded}</div>
        <div class="metric-unit">${pointsNeeded} NQ points</div>
      </div>
      <div class="metric">
        <div class="metric-label">$ per tick</div>
        <div class="metric-value">$${Math.round(grossPerTick)}</div>
        <div class="metric-unit">${contracts} contracts</div>
      </div>
      <div class="metric">
        <div class="metric-label">Total if passes</div>
        <div class="metric-value">$${Math.round(totalProfit).toLocaleString()}</div>
        <div class="metric-unit">over ${days} day${days>1?'s':''}</div>
      </div>
    </div>
    <div class="trade-box">
      <div class="trade-row"><span>Contracts</span><span>${contracts} NQ mini</span></div>
      <div class="trade-row"><span>Tick target</span><span>${ticksNeeded} ticks (${pointsNeeded} pts)</span></div>
      <div class="trade-row"><span>Gross move</span><span>$${(ticksNeeded * grossPerTick).toLocaleString()}</span></div>
      <div class="trade-row"><span>Commission (${contracts} &times; $${commPerCont.toFixed(2)})</span><span>&minus;$${commPerTrade.toFixed(2)}</span></div>
      <div class="trade-row"><span>Net per day</span><span>$${Math.round(actualNet).toLocaleString()}</span></div>
      ${days > 1 ? `<div class="trade-row total"><span>Total over ${days} days</span><span>$${Math.round(totalProfit).toLocaleString()}</span></div>` : ''}
    </div>
    <p class="note">One trade per day. Passes on profit hit, fails on loss. NQ tick = $5.00 &middot; 1 point = 4 ticks = $20 per contract.</p>
  `;
}

document.querySelectorAll('.firm-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.firm-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderSizeButtons(tab.dataset.firm);
  });
});

['target','days','contracts','commission'].forEach(id => {
  document.getElementById(id).addEventListener('input', calc);
});

renderSizeButtons('apex');
</script>
</body>
</html>
